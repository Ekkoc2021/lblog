# 生产环境配置
# 启动方式: java -jar lblog-server.jar --spring.profiles.active=prod

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  web:
    resources:
      add-mappings: true   # 开启以允许 WebConfig 自定义的 /uploads/** 资源映射
  datasource:
    url: jdbc:mysql://localhost:3306/iblog?characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&connectionTimeZone=%2B08:00
    username: lblog
    password: ${DB_PASSWORD:}
    druid:
      filters: wall,slf4j   # 生产环境去掉 stat 监控

logging:
  level:
    root: INFO
    com.yang.lblogserver: INFO

lblog:
  upload-dir: /data/lblog/uploads
